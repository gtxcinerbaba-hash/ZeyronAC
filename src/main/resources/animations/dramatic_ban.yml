# ZeyronAC Animation Engine v2.0 - 1.21.4 Custom Palette Config
# Theme: Orange surroundings, white DNA and slow ascent for perfect timing
# Duration: 4.5 seconds (90 ticks)

totalTicks: 90
freezePlayer: true
strikeLightningAtEnd: false
stripPlayer: true
itemDropIntervalTicks: 4
customLevitationAmplifier: 3 

# SLOW ASCENT: Player smoothly flies up to tick 75, staying inside effects
movement:
  startTick: 1
  endTick: 75         # Increased ascent time, now launch speed is lower
  offsetX: 0.0
  offsetY: 5.0        # Ascent height (5 blocks)
  smooth: true        # Smooth acceleration and deceleration at the top

stages:
  # ==========================================
  # STAGE 1: WHITE DNA AND ORANGE SURROUNDINGS (1 - 90 ticks)
  # ==========================================
  - name: "Pillar Core & DNA"
    startTick: 1
    endTick: 90
    particles:
      # EFFECT 1: Central DNA spiral - PURE WHITE
      - particleType: "DUST"
        shape: "RISING_SPIRAL"
        intervalTicks: 1
        count: 4 
        radiusStart: 0.6  
        radiusEnd: 0.6    
        heightOffsetStart: -2.0
        heightOffsetEnd: 4.0
        isColored: true
        red: 255
        green: 255
        blue: 255         
        particleSize: 1.3
        speed: 0.04

      # EFFECT 2: Outer ring surroundings - ORANGE
      - particleType: "DUST"
        shape: "HELIX"
        intervalTicks: 1
        count: 4
        radiusStart: 1.4  
        radiusEnd: 1.4
        heightOffsetStart: -2.0
        heightOffsetEnd: 4.0
        isColored: true
        red: 255
        green: 140
        blue: 0           
        particleSize: 1.2
        speed: 0.03

    sounds:
      - soundType: "BLOCK_PORTAL_AMBIENT"
        playAtTick: 0
        volume: 1.0
        pitch: 0.5 
        loop: true
        loopIntervalTicks: 12

    # Orange trail below feet, supporting the slow ascent
    particleTrail:
      particleType: "DUST" 
      intervalTicks: 1   
      count: 4            
      radiusStart: 0.4
      radiusEnd: 1.0
      heightOffsetStart: -4.0 
      heightOffsetEnd: 1.0
      isColored: true
      red: 255
      green: 110
      blue: 0             
      particleSize: 1.3
      speed: 0.02

  # ==========================================
  # STAGE 2: CLIMAX - COLLAPSING ORANGE SPHERE (40 - 85 ticks)
  # ==========================================
  # Now the player at ticks 40-75 slowly floats right inside the collapsing dome
  - name: "Collapsing Orange Sphere"
    startTick: 40
    endTick: 85
    particles:
      - particleType: "DUST"
        shape: "SPHERE"
        intervalTicks: 1  
        count: 45         
        radiusStart: 5.0  
        radiusEnd: 0.1    # Closes right on the slowed player
        heightOffsetStart: 1.0
        heightOffsetEnd: 1.0
        isColored: true
        red: 255
        green: 120
        blue: 0           
        particleSize: 1.4 
        speed: 0.0        
    sounds:
      - soundType: "ENTITY_WITHER_SPAWN"
        playAtTick: 0
        volume: 0.9
        pitch: 1.3

  # ==========================================
  # STAGE 3: FINALE - VOLUMINOUS DENSE SMOKE ABOVE (85 - 90 ticks)
  # ==========================================
  - name: "Heavy Smoke Out"
    startTick: 85
    endTick: 90
    particles:
      - particleType: "SMOKE" 
        shape: "SPHERE" 
        intervalTicks: 1
        count: 75         
        radiusStart: 0.1  
        radiusEnd: 2.0    
        heightOffsetStart: 0.2 
        heightOffsetEnd: 2.2
        speed: 0.01       

    sounds:
      - soundType: "BLOCK_GLASS_BREAK" 
        playAtTick: 0
        volume: 1.3
        pitch: 1.5