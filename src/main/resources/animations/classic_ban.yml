# ZeyronAC Animation Engine v2.0 - 1.21.4 Optimized Configuration
# Theme: Monochrome DNA ascension and single sharp explosion without stacking
# Duration: 4.5 seconds (90 ticks)

totalTicks: 90
freezePlayer: true
strikeLightningAtEnd: false
stripPlayer: true
itemDropIntervalTicks: 5
customLevitationAmplifier: 2

# Ascent speed slowed so the player stays strictly inside effects until the end
movement:
  startTick: 1
  endTick: 75
  offsetX: 0.0
  offsetY: 4.0
  offsetZ: 0.0
  smooth: true

stages:
  # ==========================================
  # STAGE 1: Ascension inside Black-White DNA (1 - 90 ticks)
  # ==========================================
  - name: "Monochrome DNA Ascension"
    startTick: 1
    endTick: 90
    particles:
      - particleType: "SMOKE"
        shape: "HELIX"
        intervalTicks: 1
        count: 4
        radiusStart: 1.5
        radiusEnd: 1.0
        heightOffsetStart: -2.0
        heightOffsetEnd: 3.0
        speed: 0.02
    sounds:
      - soundType: "BLOCK_PORTAL_AMBIENT"
        playAtTick: 0
        volume: 0.9
        pitch: 0.5
        loop: true
        loopIntervalTicks: 12
    particleTrail:
      particleType: "DUST"
      intervalTicks: 1
      count: 4
      isColored: true
      red: 100
      green: 100
      blue: 100
      particleSize: 1.2
      offsetX: 0.2
      offsetY: 0.5
      offsetZ: 0.2

  # ==========================================
  # STAGE 2: White Converging Sphere (40 - 85 ticks)
  # ==========================================
  - name: "Converging White Sphere"
    startTick: 40
    endTick: 85
    particles:
      - particleType: "DUST"
        shape: "SPHERE"
        intervalTicks: 1
        count: 30
        radiusStart: 4.5
        radiusEnd: 0.2     
        heightOffsetStart: 1.0
        heightOffsetEnd: 1.0
        isColored: true
        red: 255
        green: 255
        blue: 255
        particleSize: 1.4
        speed: 0.0
    sounds:
      - soundType: "ENTITY_WITHER_SPAWN"
        playAtTick: 0
        volume: 0.8
        pitch: 1.5

  # ==========================================
  # STAGE 3: Second inner silver DNA (45 - 85 ticks)
  # ==========================================
  - name: "Silver DNA Core"
    startTick: 45
    endTick: 85
    particles:
      - particleType: "DUST"
        shape: "HELIX"
        intervalTicks: 1
        count: 3
        radiusStart: 1.2
        radiusEnd: 0.1
        heightOffsetStart: -1.5
        heightOffsetEnd: 1.5
        isColored: true
        red: 200
        green: 200
        blue: 200
        particleSize: 1.1
        speed: 0.04
    sounds:
      - soundType: "BLOCK_NOTE_BLOCK_PLING"
        playAtTick: 0
        volume: 0.6
        pitch: 0.4
        loop: true
        loopIntervalTicks: 6

  # ==========================================
  # STAGE 4: Single sharp burst (85 - 90 ticks)
  # ==========================================
  - name: "Instant White Flash"
    startTick: 85
    endTick: 90          
    particles:
      - particleType: "DUST"
        shape: "EXPLOSION"   
        intervalTicks: 5    # IMPORTANT: Spawns particles ONLY ONCE per stage, removing stacking
        count: 40           # 40 neat single particles
        radiusStart: 0.1    
        radiusEnd: 1.8      # Compact, stylish spread radius
        heightOffsetStart: 1.0
        heightOffsetEnd: 1.0
        isColored: true
        red: 255            
        green: 255
        blue: 255
        particleSize: 1.1   # Elegant size, not harsh on the eyes
        speed: 1.5          # Good speed for instant, clear spread
    sounds:
      - soundType: "ENTITY_GENERIC_EXPLODE" 
        playAtTick: 0
        volume: 1.4
        pitch: 1.3