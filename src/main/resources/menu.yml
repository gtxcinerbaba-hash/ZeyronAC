# Configuration for Suspects GUI
gui:
  title: "&cZeyronAC &8> &7Suspects"
  size: 54
  items:
    suspect_head:
      name: "&c{PLAYER}"
      lore:
        - "&8&m------------------------"
        - "&7AVG Probability: {AVG_PROB}"
        - "&7DB Detections: {DETECTIONS}"
        - "&7History (Last {HISTORY_SIZE}):"
        - "{HISTORY}"
        - "&8&m------------------------"
        - "&eLMB: custom action"
        - "&eRMB: custom action"
  actions:
    left-click:
      - "[teleport]"
      - "[message] &aTeleported to {PLAYER}"
    right-click:
      - "[gamemode] SPECTATOR"
      - "[teleport]"
      - "[message] &aTeleported to {PLAYER} in Spectator mode"
#    shift-left-click:
#      - "[player] zeyronac profile {PLAYER}"
#    shift-right-click:
#      - "[console] tp {ADMIN} {PLAYER}"
#    middle-click:
#      - "[close]"
    previous_page:
      material: ARROW
      name: "&ePrevious Page (&f{PAGE}&e)"
    next_page:
      material: ARROW
      name: "&eNext Page (&f{PAGE}&e)"
    page_info:
      material: PAPER
      name: "&bPage &f{CURRENT} &7/ &f{TOTAL}"
    filler:
      material: GRAY_STAINED_GLASS_PANE
      name: " "
