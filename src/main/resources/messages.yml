alerts-enabled: '&fAlerts &aenabled'
alerts-disabled: '&fAlerts &cdisabled'
monitor-enabled: '&fMonitor mode &aenabled &7| all detections shown'
monitor-disabled: '&fMonitor mode &cdisabled'
monitor-format: '&#F1F1F1▍ &#D8D8D8Z&#BFBFBFY&#A6A6A6R&#8D8D8DA&#747474C &r&#81FFC2[{MODEL}]&f &f{PLAYER} &7- {PROBABILITY_COLORED}'
# Local alert shown on the server where the violation was detected.
# Optional placeholder: {STEP_PERCENT} — when the alert is fired from a buffer-step crossing
# (alert-responses.alerts.buffer-step-percent), resolves to 33/66/99/...; empty otherwise.
alert-format: '&#81FFC2[{MODEL}]&f &f{PLAYER} &7Failed check &#E5396A(&#E5396AA&#E6366Ai&#E7346Am&#E83169-&#E92F69A&#EA2C69i: &f{PROBABILITY}&#E5396A)&f
  &#E5396A(&#E5396AB&#E6366Au&#E7346Af&#E83169f&#E92F69e&#EA2C69r: &f{BUFFER}&#E5396A)&f'
alert-format-vl: '&f{PLAYER} &7Got VL &#E5396A(&#E5396AVL:&f{VL}&#E5396A) &#E5396A(&#E5396AB&#E6366Au&#E7346Af&#E83169f&#E92F69e&#EA2C69r: &f{BUFFER}&#E5396A)'
# Alert received from another server through inter-server mode.
interserver-alert-format: '&#81FFC2[{MODEL}]&f &#1E9F9A[Cross-server: &#19EEE6{SERVER}&#1E9F9A] &f{PLAYER} &7Failed check &#E5396A(&#E5396AA&#E6366Ai&#E7346Am&#E83169-&#E92F69A&#EA2C69i: &f{PROBABILITY}&#E5396A)&f
  &#E5396A(&#E5396AB&#E6366Au&#E7346Af&#E83169f&#E92F69e&#EA2C69r: &f{BUFFER}&#E5396A)&f'
